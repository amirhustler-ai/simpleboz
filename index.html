<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرورگر ساده من</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Tahoma, sans-serif;
            background: #1a1a2e;
        }
        
        /* نوار ابزار */
        .toolbar {
            background: #16213e;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
        }
        
        /* دکمه‌ها */
        button {
            background: #0f3460;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #e94560;
        }
        
        /* نوار آدرس */
        #url-bar {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            direction: ltr;
            text-align: left;
            background: #0a0f1a;
            color: white;
        }
        
        #url-bar:focus {
            outline: none;
            background: #1a1a2e;
        }
        
        /* وضعیت بارگذاری */
        .status {
            background: #0f3460;
            color: #ccc;
            padding: 5px 12px;
            font-size: 12px;
            border-top: 1px solid #16213e;
        }
        
        /* فریم نمایش وبسایت */
        #browser-frame {
            width: 100%;
            height: calc(100vh - 85px);
            border: none;
            background: white;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e94560;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="goBack()" title="بازگشت">←</button>
        <button onclick="goForward()" title="بعدی">→</button>
        <button onclick="refreshPage()" title="بازآوری">⟳</button>
        <button onclick="goHome()" title="خانه">🏠</button>
        <input type="text" id="url-bar" placeholder="آدرس وبسایت را وارد کنید... مثلاً google.com">
        <button onclick="navigate()">برو</button>
    </div>
    
    <div class="status" id="status">
        ✅ آماده
    </div>
    
    <iframe id="browser-frame" src="about:blank"></iframe>

    <script>
        // گرفتن عناصر از صفحه
        const frame = document.getElementById('browser-frame');
        const urlInput = document.getElementById('url-bar');
        const statusDiv = document.getElementById('status');
        
        // صفحه اصلی
        const HOME_PAGE = 'https://www.google.com';
        
        // تابع تغییر وضعیت
        function setStatus(text, isLoading = false) {
            if (isLoading) {
                statusDiv.innerHTML = '<span class="loading"></span> ' + text;
            } else {
                statusDiv.innerHTML = '✅ ' + text;
            }
        }
        
        // تابع اصلی برای بارگذاری آدرس
        function loadUrl(url) {
            if (!url || url === '') {
                url = HOME_PAGE;
            }
            
            // اگه http یا https نداشت، اضافه کن
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            setStatus(`در حال بارگذاری: ${url}...`, true);
            urlInput.value = url;
            
            // بارگذاری در iframe
            frame.src = url;
        }
        
        // وقتی صفحه لود شد
        frame.onload = function() {
            setStatus(`بارگذاری کامل شد: ${frame.src}`);
            
            // تلاش برای گرفتن آدرس واقعی از iframe
            try {
                if (frame.contentWindow.location.href !== 'about:blank') {
                    urlInput.value = frame.contentWindow.location.href;
                }
            } catch(e) {
                // به خاطر سیاست امنیتی، بعضی سایت‌ها نشون نمی‌دن
                console.log('نمی‌توان آدرس را دریافت کرد');
            }
        };
        
        // خطا در بارگذاری
        frame.onerror = function() {
            setStatus('❌ خطا: سایت مورد نظر قابل بارگذاری نیست');
        };
        
        // تابع هدایت از نوار آدرس
        function navigate() {
            let url = urlInput.value.trim();
            loadUrl(url);
        }
        
        // دکمه بازگشت
        function goBack() {
            try {
                frame.contentWindow.history.back();
            } catch(e) {
                setStatus('❌ نمی‌توان به عقب رفت');
            }
        }
        
        // دکمه بعدی
        function goForward() {
            try {
                frame.contentWindow.history.forward();
            } catch(e) {
                setStatus('❌ نمی‌توان به جلو رفت');
            }
        }
        
        // دکمه refresh
        function refreshPage() {
            try {
                frame.contentWindow.location.reload();
                setStatus('صفحه بازآوری شد...');
            } catch(e) {
                loadUrl(urlInput.value);
            }
        }
        
        // دکمه خانه
        function goHome() {
            loadUrl(HOME_PAGE);
        }
        
        // وقتی Enter توی نوار آدرس زده شد
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                navigate();
            }
        });
        
        // بارگذاری صفحه اصلی در شروع
        loadUrl(HOME_PAGE);
    </script>
</body>
</html>
